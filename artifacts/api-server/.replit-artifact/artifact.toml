kind = "api"
previewPath = "/"
title = "AI Investment Assistant API"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/"]

[services.development]
run = "pnpm -w run dev:python"

[services.production]

[services.production.build]
args = ["bash", "-c", "cd python-backend && python3 -m venv .venv && .venv/bin/pip install --quiet -r requirements.txt"]

[services.production.run]
args = ["pnpm", "-w", "run", "start:python"]

[services.production.run.env]
PORT = "8080"
APP_ENV = "production"

[services.production.health.startup]
path = "/"
