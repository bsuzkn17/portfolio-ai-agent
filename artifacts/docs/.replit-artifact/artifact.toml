kind = "web"
previewPath = "/docs/"
title = "AI Investment Assistant — Docs"
version = "1.0.0"
id = "artifacts/docs"
router = "path"

[[services]]
name = "web"
paths = [ "/docs/" ]
localPort = 21121

[services.development]
run = "pnpm --filter @workspace/docs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/docs", "run", "build" ]
serve = "static"
publicDir = "artifacts/docs/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21121"
BASE_PATH = "/docs/"
